<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Robot | FTC Nyx 34612</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#09090c;
  --bg2:#11131a;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --primary:#7c3aed;
  --border:rgba(255,255,255,0.10);
  --panel:rgba(255,255,255,0.045);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:"Inter",sans-serif;
  color:var(--text);
  min-height:100vh;
  background:
    radial-gradient(900px 500px at 15% 10%, rgba(124,58,237,0.18), transparent 60%),
    radial-gradient(700px 450px at 85% 20%, rgba(124,58,237,0.10), transparent 55%),
    linear-gradient(135deg, var(--bg), var(--bg2));
  display:flex;
  flex-direction:column;
}

a{
  color:inherit;
  text-decoration:none;
}

nav{
  position:sticky;
  top:0;
  z-index:100;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:1.2rem 5%;
  background:rgba(0,0,0,0.42);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.06);
}

.logo{
  font-family:"Orbitron",sans-serif;
  color:var(--primary);
  font-size:1.2rem;
  font-weight:700;
  letter-spacing:0.08em;
}

nav ul{
  list-style:none;
  display:flex;
  gap:1.5rem;
  flex-wrap:wrap;
}

nav a{
  color:var(--text);
  font-weight:500;
  transition:0.2s;
}

nav a:hover,
nav a.active{
  color:var(--primary);
}

main{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:4rem 10%;
}

.notice{
  width:100%;
  max-width:820px;
  text-align:center;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:28px;
  padding:3.5rem 2rem;
  box-shadow:0 20px 60px rgba(0,0,0,0.25);
}

.eyebrow{
  font-family:"Orbitron",sans-serif;
  color:var(--primary);
  text-transform:uppercase;
  letter-spacing:0.12em;
  font-size:0.9rem;
  margin-bottom:1rem;
}

.notice h1{
  font-family:"Orbitron",sans-serif;
  font-size:clamp(2rem, 5vw, 3.6rem);
  margin-bottom:1rem;
}

.notice p{
  color:var(--muted);
  font-size:1.05rem;
  line-height:1.8;
  max-width:620px;
  margin:0 auto;
}

footer{
  padding:2rem 10%;
  text-align:center;
  color:var(--muted);
  border-top:1px solid rgba(255,255,255,0.06);
  background:rgba(0,0,0,0.22);
}

@media (max-width: 640px){
  nav{
    padding:1rem 6%;
  }

  main,
  footer{
    padding-left:6%;
    padding-right:6%;
  }

  .notice{
    padding:2.5rem 1.25rem;
  }
}
</style>
</head>
<body>

<nav>
  <div class="logo">NYX 34612</div>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="robot.html" class="active">Robot</a></li>
    <li><a href="meet.html">Team</a></li>
    <li><a href="sponsor.html">Sponsors</a></li>
  </ul>
</nav>

<main>
  <section class="notice">
    <div class="eyebrow">Robot Page</div>
    <h1>Nothing here yet.</h1>
    <p>
      Wait until the 2026–2027 season.
    </p>
  </section>
</main>

<footer>
  © 2026 FTC Team Nyx 34612
</footer>

</body>
</html>
